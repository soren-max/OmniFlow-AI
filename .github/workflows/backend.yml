name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run ruff check
        run: uv run ruff check apps/api/

      - name: Run mypy type check
        run: uv run mypy apps/api/ --config-file pyproject.toml

      - name: Run pytest
        run: uv run pytest apps/api/tests/ -v --tb=short
