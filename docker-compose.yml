version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: contentops-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contentops_password}
      POSTGRES_DB: ${POSTGRES_DB:-contentops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentops} -d ${POSTGRES_DB:-contentops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentops-network

  redis:
    image: redis:7-alpine
    container_name: contentops-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contentops-network

volumes:
  postgres_data:
    name: contentops-postgres-data
  redis_data:
    name: contentops-redis-data

networks:
  contentops-network:
    name: contentops-network
    driver: bridge
